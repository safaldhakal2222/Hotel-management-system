<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Management System - Booking</title>

<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<script src="api.js"></script>
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">

    <div class="left">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>

    <div class="center">
        <h1>Bookings Management</h1>
    </div>

    <div class="right">
        <div class="user" id="userDisplay">Admin</div>
        <button onclick="logout()" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-left: 10px;">Logout</button>
    </div>
</header>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="logo">HotelMS</div>

    <a href="index.html">🏠 Dashboard</a>
    <a href="booking.html">🛏 Bookings</a>
    <a href="rooms.html">🏨 Rooms</a>
    <a href="customers.html">👤 Customers</a>
    <a href="payments.html">💳 Payments</a>
    <a href="settings.html">⚙ Settings</a>
</aside>

<!-- MAIN -->
<main class="main-content" id="mainContent">

    <div class="page-header">
        <h2>New Booking</h2>
        <p>Create and manage hotel reservations</p>
    </div>
    
    <form id="bookingForm">
        <div class="Box">
            <div class="grid-layout">

                <!-- HOTEL SELECTION -->
                <div class="card">
                    <h3>Select Hotel</h3>
                    <label>Hotel</label>
                    <select id="hotelId" required>
                        <option value="">Select a hotel</option>
                    </select>
                </div>

                <!-- GUEST INFO -->
                <div class="card">
                    <h3>Guest Information</h3>

                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="Enter first name" required>

                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter last name" required>

                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>

                    <label>Phone</label>
                    <input type="text" id="phone" placeholder="Enter phone number" required>
                </div>

                <!-- ROOM INFO -->
                <div class="card">
                    <h3>Room Details</h3>

                    <label>Room</label>
                    <select id="roomId" required>
                        <option value="">Select a room</option>
                    </select>

                    <label>Number of Guests</label>
                    <input type="number" id="numberOfGuests" value="1" min="1" required>
                </div>

                <!-- CHECK IN -->
                <div class="card">
                    <h3>Check-in Date</h3>
                    <input type="date" id="checkInDate" required>
                </div>

                <!-- CHECK OUT -->
                <div class="card">
                    <h3>Check-out Date</h3>
                    <input type="date" id="checkOutDate" required>
                </div>

            </div>
            
            <!-- ACTION -->
            <div class="card highlight">
                <h3>Booking Action</h3>
                <button type="button" onclick="createBooking()">Create Booking</button>
            </div>
        </div>        
    </form>

</main>

<footer>
    © 2026 Hotel Management System
</footer>

<script src="script.js"></script>

</body>
</html>
